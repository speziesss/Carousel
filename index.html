<!DOCTYPE html>
<html>
 <head>
<meta charset="UTF-8">
  <title> Simple Carousel Slides </title>
 </head>

<style>
body{
  font-family: Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background: linear-gradient(to right, #FFC0CB, #FFFFFF);
}

.carousel{
  position:relative;
  width:500px;
  height:300px;
  overflow:hidden;
  border-radius:10px;
}

.slides{
  display:flex;
  transition:transform 0.5s ease;
}

.slide{
  min-width:100%;
}

.slide img{
  width:100%;
  height:300px;
  object-fit:cover;
}

button{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.5);
  color:white;
  border:none;
  padding:10px 15px;
  cursor:pointer;
}

.prev{ left:10px; }
.next{ right:10px; }
</style>

 <body>
<div class="carousel">
  <div class="slides" id="slides">

    <a class="slide">
      <img src="Waguri.jpg" alt:"Waguri">
    </a>

    <a class="slide">
      <img src="Rintaro.jpg" alt:"Rintaro">
    </a>

    <a class="slide">
      <img src="Saku.jpg" alt:"Saku">
    </a> 

    <a class="slide">
      <img src="Subaru.jpg" alt:"Subaru">
    </a>
    
    <a class="slide">
      <img src="Usami.jpg" alt:"Usami">
    </a>

    <a class="slide">
      <img src="Ayato.jpg" alt:"Ayato">
    </a>
  </div>

  <button class="prev" onclick="prev()">❮</button>
  <button class="next" onclick="next()">❯</button>
</div>
<script>
let index = 0;
const slides = document.getElementById("slides");
const total = slides.children.length;

function updateSlide(){
  slides.style.transform = `translateX(-${index * 100}%)`;
}

function next(){
  index = (index + 1) % total;
  updateSlide();
}

function prev(){
  index = (index - 1 + total) % total;
  updateSlide();
}
</script>
 </body>
</html>
